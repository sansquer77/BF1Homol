[server]
port = 8080
address = "0.0.0.0"
enableCORS = true
enableXsrfProtection = true
headless = true
# Barreira global; limites específicos mais baixos são aplicados no código de backup.
maxUploadSize = 10
enableStaticServing = true

[browser]
serverAddress = "0.0.0.0"
gatherUsageStats = false

[theme]
# Tema Liquid Glass - Inspirado no design Apple
primaryColor = "#E13427"
backgroundColor = "#0a0a0f"
secondaryBackgroundColor = "#1a1a2e"
textColor = "#ffffff"
font = "sans serif"
